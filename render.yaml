# Blueprint Render — ajuste o nome do servico e crie o Web Service a partir do repositorio.
# Documentacao: https://render.com/docs/blueprint-spec
#
# Banco recomendado: PostgreSQL (nativo do Render/Neon/Supabase).
# Tambem aceita MySQL via PORTAL_DATABASE_URL com schema mysql://...

services:
  - type: web
    name: portal-wct
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /index.php?page=dashboard
    envVars:
      - key: PORTAL_BASE_URL
        value: /
      - key: PORTAL_TZ
        value: America/Sao_Paulo
      - key: PORTAL_DB_DRIVER
        value: pgsql
        sync: false
      - key: PORTAL_DB_HOST
        sync: false
      - key: PORTAL_DB_PORT
        value: "5432"
        sync: false
      - key: PORTAL_DB_NAME
        sync: false
      - key: PORTAL_DB_USER
        sync: false
      - key: PORTAL_DB_PASS
        sync: false
      # Alternativa recomendada: URL unica (postgresql://user:pass@host:5432/db)
      - key: PORTAL_DATABASE_URL
        sync: false
      - key: TRACKING_PUBLIC_URL
        sync: false
