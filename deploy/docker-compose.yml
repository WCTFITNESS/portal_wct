# Stack local: Portal WCT (PHP) + Tracking (Node) + MySQL + Postgres + Nginx.
# Uso (na pasta deploy):
#   docker compose up -d --build
#
# URLs (apos hosts + porta STACK_HTTP_PORT, padrao 8088):
#   http://portal.wct.local:8088/portal_wct/index.php
#   http://tracking.wct.local:8088/
#
# Links entre sistemas: configure TRACKING_PUBLIC_URL e PORTAL_WCT_PUBLIC no .env

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${STACK_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portal-wct
      - tracking-wct
    restart: unless-stopped

  portal-wct:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      PORTAL_DB_HOST: mysql
      PORTAL_DB_PORT: "3306"
      PORTAL_DB_NAME: portal_wct
      PORTAL_DB_USER: portal
      PORTAL_DB_PASS: ${MYSQL_PORTAL_PASSWORD:-portal_local}
      PORTAL_BASE_URL: /portal_wct
      TRACKING_PUBLIC_URL: ${TRACKING_PUBLIC_URL:-http://tracking.wct.local:8088/admin/dashboard}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  tracking-wct:
    build:
      context: ../../tracking-wct
      dockerfile: deploy/Dockerfile
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: ${TRACKING_DATABASE_URL:-postgresql://tracking:tracking_local@postgres:5432/tracking}
      PORTAL_WCT_URL: ${PORTAL_WCT_PUBLIC:-http://portal.wct.local:8088/portal_wct/index.php}
      CRON_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_local}
      MYSQL_DATABASE: portal_wct
      MYSQL_USER: portal
      MYSQL_PASSWORD: ${MYSQL_PORTAL_PASSWORD:-portal_local}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database.sql:/docker-entrypoint-initdb.d/01-portal.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracking_local}
      POSTGRES_DB: tracking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking -d tracking"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data:
