# Proxy Apache: Portal WCT -> Node WCT Code (sidecar local)
<IfModule mod_proxy.c>
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Prefix "/wct-code-app"
    ProxyPass /wct-code-app http://127.0.0.1:3001/wct-code-app
    ProxyPassReverse /wct-code-app http://127.0.0.1:3001/wct-code-app
</IfModule>
