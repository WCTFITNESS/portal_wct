# mod_php herda ambiente do processo; aqui apenas variaveis que o Render costuma definir.
# PassEnv de variavel inexistente gera AH01506. DB detalhado via config/db-runtime.php (entrypoint).

<IfModule mod_env.c>
    PassEnv PORTAL_BASE_URL
    PassEnv PORTAL_TZ
    PassEnv PORTAL_DATABASE_URL
</IfModule>
