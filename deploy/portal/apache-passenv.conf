# Garante que variaveis do container cheguem ao PHP (mod_php).
<IfModule mod_env.c>
    PassEnv PORTAL_DB_HOST
    PassEnv PORTAL_DB_PORT
    PassEnv PORTAL_DB_NAME
    PassEnv PORTAL_DB_USER
    PassEnv PORTAL_DB_PASS
    PassEnv PORTAL_BASE_URL
    PassEnv TRACKING_PUBLIC_URL
    PassEnv PORTAL_TZ
</IfModule>
