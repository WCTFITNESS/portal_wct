# Dois hostnames no mesmo Nginx (evita path /tracking no Node sem alterar o React).
# Adicione no Windows: C:\Windows\System32\drivers\etc\hosts
#   127.0.0.1 portal.wct.local
#   127.0.0.1 tracking.wct.local

server {
    listen 80;
    server_name portal.wct.local;

    location / {
        proxy_pass http://portal-wct:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }
}

server {
    listen 80;
    server_name tracking.wct.local;

    location / {
        proxy_pass http://tracking-wct:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
